name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-stg:
    name: STG 배포
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/blog-server:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/blog-server:latest

      - name: STG 서버 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STG_HOST }}
          username: deploy
          key: ${{ secrets.STG_SSH_KEY }}
          script: |
            bash /app/scripts/deploy.sh ${{ secrets.DOCKER_USERNAME }}/blog-server:${{ github.sha }} stg

  deploy-prod:
    name: PROD 배포
    runs-on: ubuntu-latest
    needs: deploy-stg
    environment: production

    steps:
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: PROD 서버 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            bash /app/scripts/deploy.sh ${{ secrets.DOCKER_USERNAME }}/blog-server:${{ github.sha }} prod
