name: Rollback

on:
  workflow_dispatch:

jobs:
  rollback-prod:
    name: PROD 롤백
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: PROD 서버 롤백
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            bash /app/scripts/rollback.sh
