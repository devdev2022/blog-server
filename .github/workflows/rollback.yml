name: Rollback

on:
  workflow_dispatch:

jobs:
  rollback-stg:
    name: STG 롤백
    runs-on: ubuntu-latest

    steps:
      - name: STG 서버 롤백
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STG_HOST }}
          username: deploy
          key: ${{ secrets.STG_SSH_KEY }}
          script: |
            bash /app/scripts/rollback.sh
